<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHRONOS OS</title>
    
    <script>
        window.addEventListener('error', function(e) {
            document.body.innerHTML = '<div style="color:#ef4444; padding:20px; font-family:monospace; z-index:9999; background:black; height:100vh; width:100vw;">' + 
                '<h3 style="font-weight:bold; margin-bottom:10px;">SYSTEM CRASH</h3><p>' + e.message + '</p></div>';
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <style>
        body { background-color: #050505; overscroll-behavior: none; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        ::-webkit-scrollbar { display: none; }
        
        .scanlines::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 50; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        input[type=range].fidget-slider { -webkit-appearance: none; background: transparent; }
        input[type=range].fidget-slider::-webkit-slider-thumb {
            -webkit-appearance: none; height: 32px; width: 16px;
            background: #06b6d4; border: 2px solid #fff; border-radius: 2px;
            box-shadow: 0 0 10px #06b6d4; cursor: pointer; margin-top: -12px;
        }
        input[type=range].fidget-slider::-webkit-slider-runnable-track {
            width: 100%; height: 8px; cursor: pointer; background: #172554; border-radius: 4px;
        }

        .glitch-bg { animation: flash 0.1s infinite; mix-blend-mode: screen; pointer-events: none; }
        @keyframes flash { 0% { background-color: rgba(255,0,255,0.1); } 50% { background-color: rgba(0,255,255,0.1); } 100% { background-color: rgba(255,0,0,0.1); } }
        .crt-flicker { animation: flicker 0.15s infinite; }
        @keyframes flicker { 0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        /* Ticker: 50% Faster Speed (reduced animation cycle to 13 seconds) */
        @keyframes marquee { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }
        .marquee-content { display: inline-block; white-space: nowrap; animation: marquee 13s linear infinite; }

        /* Reactive Status Indicator Flash: Single 0.25s Flash */
        @keyframes status-pulse {
            0% { background-color: rgba(6, 182, 212, 0.5); box-shadow: inset 0 0 15px rgba(6, 182, 212, 0.3); }
            100% { background-color: rgba(0, 0, 0, 1); box-shadow: none; }
        }
        .animate-status-flash {
            animation: status-pulse 0.25s linear 1;
        }
    </style>
</head>
<body class="text-cyan-400 font-mono h-[100dvh] w-screen overflow-hidden touch-none select-none scanlines flex flex-col">
    
    <div id="root" class="h-full w-full max-w-lg mx-auto flex flex-col p-2 gap-2 relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const DESTINATIONS = [
            { year: 1888, location: "London, England", name: "Victorian Anchor", news: ["FOG ROLLS INTO CITY", "STRANGE LIGHTS REPORTED ABOVE THAMES"] },
            { year: 1912, location: "North Atlantic Ocean", name: "Iceberg Sector", news: ["VESSEL STRUCK BY UNKNOWN SUBMERGED OBJECT", "DISTRESS CALLS SILENCED"] },
            { year: 1929, location: "New York, USA", name: "Market Crash", news: ["MARKET SPIRALS", "UNKNOWN INDIVIDUAL SEEN BUYING THOUSANDS OF SHARES"] },
            { year: 1969, location: "Tranquility Base, Moon", name: "Apollo 11 Landing", news: ["ONE SMALL STEP RECORDED", "RADIO STATIC INTERFERENCE HIGH"] },
            { year: 1985, location: "Hill Valley, California", name: "Neon Nexus", news: ["TEENAGER CLAIMS TO HAVE INVENTED TIME MACHINE", "MALL PARKING LOT INCIDENT"] },
            { year: 2026, location: "The Party Estate", name: "Present Anchor", news: ["SYSTEM: LOCAL ANCHOR POINT SECURED", "NO ANOMALIES DETECTED"] },
            { year: 2150, location: "Cydonia, Mars", name: "Red Dust Colony", news: ["ATMOSPHERIC DOME COMPROMISED", "RESCUE SHIPS DISPATCHED"] },
            { year: 2200, location: "L5 Lagrange Point", name: "Void Gateway Station", news: ["FIRST INTERSTELLAR JUMP COMMENCING", "SIGNAL STRENGTH CRITICAL"] },
            { year: 3000, location: "New New York, Earth", name: "Future Apex Metropolis", news: ["TIME FLOW NON-LINEAR", "PROBABILITY CONSTANT SHIFTING"] }
        ];

        const generateJumble = (seed, length) => {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*<>?";
            let res = "";
            let s = seed;
            for(let i=0; i<length; i++) {
                let x = Math.sin(s++) * 10000;
                res += chars[Math.floor(Math.abs(x - Math.floor(x)) * chars.length)];
            }
            return res;
        };

        const IconAlert = () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01"/></svg>;

        // --- CYBERPUNK KNOB (JS ANIMATION DRIVEN, ENLARGED) ---
        const CyberKnob = ({ floatIndex, maxIndex, onChange, onSnap, onDragStart }) => {
            const knobRef = useRef(null);
            const [isDragging, setIsDragging] = useState(false);
            const [rotation, setRotation] = useState(0);
            
            const prevAngleRef = useRef(0);
            const accumRotationRef = useRef(0);
            const degreesPerItem = 1080 / maxIndex;

            useEffect(() => {
                if (!isDragging) {
                    accumRotationRef.current = floatIndex * degreesPerItem;
                    setRotation(accumRotationRef.current);
                }
            }, [floatIndex, isDragging, degreesPerItem]);

            useEffect(() => {
                const handleMove = (e) => {
                    if (!isDragging || !knobRef.current) return;
                    e.preventDefault(); 
                    
                    const rect = knobRef.current.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    
                    let currentAngle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI); 
                    
                    let delta = currentAngle - prevAngleRef.current;
                    if (delta > 180) delta -= 360;
                    if (delta < -180) delta += 360;
                    
                    accumRotationRef.current += delta;
                    prevAngleRef.current = currentAngle;
                    
                    let clampedRotation = Math.max(0, Math.min(1080, accumRotationRef.current));
                    accumRotationRef.current = clampedRotation;
                    
                    setRotation(clampedRotation);
                    onChange(clampedRotation / degreesPerItem);
                };

                const handleUp = () => {
                    if (!isDragging) return;
                    setIsDragging(false);
                    const nearestIndex = Math.round(accumRotationRef.current / degreesPerItem);
                    onSnap(nearestIndex);
                };

                if (isDragging) {
                    window.addEventListener('mousemove', handleMove);
                    window.addEventListener('mouseup', handleUp);
                    window.addEventListener('touchmove', handleMove, { passive: false });
                    window.addEventListener('touchend', handleUp);
                }
                return () => {
                    window.removeEventListener('mousemove', handleMove);
                    window.removeEventListener('mouseup', handleUp);
                    window.removeEventListener('touchmove', handleMove);
                    window.removeEventListener('touchend', handleUp);
                };
            }, [isDragging, onChange, onSnap, degreesPerItem]);

            const handleStart = (e) => {
                setIsDragging(true);
                onDragStart(); 
                
                const rect = knobRef.current.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                prevAngleRef.current = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
            };

            return (
                <div className="flex flex-col items-center justify-center shrink-0 w-1/2">
                    <div ref={knobRef} onMouseDown={handleStart} onTouchStart={handleStart}
                         className="w-28 h-28 sm:w-32 sm:h-32 rounded-full bg-neutral-900 border-4 border-cyan-900 shadow-[0_0_20px_rgba(6,182,212,0.4)] relative cursor-pointer flex items-center justify-center touch-none"
                         style={{ transform: `rotate(${rotation}deg)` }}>
                        {/* Enlarged indicator tick */}
                        <div className="w-2 h-6 bg-fuchsia-500 rounded-full absolute top-1 shadow-[0_0_8px_#d946ef]"></div>
                        <div className="w-8 h-8 rounded-full bg-cyan-950 border border-cyan-800"></div>
                    </div>
                    {/* Updated Label Name */}
                    <div className="text-[10px] text-cyan-600 mt-2 font-bold tracking-widest uppercase">Temporal Tuner</div>
                </div>
            );
        };

        function App() {
            const [timeStr, setTimeStr] = useState("SYNCING...");
            const [msStr, setMsStr] = useState("000");
            
            // Fictional Signal Monitor strength state (fluctuates dynamically)
            const [signalStrength, setSignalStrength] = useState(5);
            
            const [floatIndex, setFloatIndexState] = useState(5); 
            const floatIndexRef = useRef(5); 
            
            const setFloatIndex = (val) => {
                floatIndexRef.current = val;
                setFloatIndexState(val);
            };

            const animFrameRef = useRef(null);
            
            const [activeTab, setActiveTab] = useState("calibrate");
            const [status, setStatus] = useState("SYSTEM NOMINAL.");
            const [jumpState, setJumpState] = useState("locked");
            const [swipeValue, setSwipeValue] = useState(0);
            
            const [causality, setCausality] = useState(false);
            const [emergency, setEmergency] = useState(false);
            const [paradoxLevel, setParadoxLevel] = useState(0); 

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    setTimeStr(now.toLocaleTimeString('en-US', { hour12: false }));
                    setMsStr(now.getMilliseconds().toString().padStart(3, '0'));
                }, 47);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (jumpState === "jumping" || emergency || paradoxLevel > 80) return;
                const msgs = ["RE-ROUTING POWER...", "CHECKING ANCHORS...", "SYNCING LATTICE...", "SYSTEM NOMINAL..."];
                const interval = setInterval(() => setStatus(msgs[Math.floor(Math.random() * msgs.length)]), 3500);
                return () => clearInterval(interval);
            }, [jumpState, emergency, paradoxLevel]);

            // Signal strength smooth fluctuation logic
            useEffect(() => {
                const interval = setInterval(() => {
                    setSignalStrength(prev => {
                        const roll = Math.random();
                        if (roll < 0.35) {
                            return Math.max(2, prev - 1);
                        } else if (roll < 0.70) {
                            return Math.min(6, prev + 1);
                        }
                        return prev;
                    });
                }, 1200);
                return () => clearInterval(interval);
            }, []);

            const animateToFloatIndex = (targetValue) => {
                if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
                
                const startValue = floatIndexRef.current;
                const distance = targetValue - startValue;
                if (distance === 0) return;

                const duration = 1200; 
                let startTime = null;

                const step = (timestamp) => {
                    if (!startTime) startTime = timestamp;
                    const progress = timestamp - startTime;
                    let percent = progress / duration;
                    if (percent >= 1) percent = 1;

                    const ease = percent < 0.5 ? 4 * percent * percent * percent : 1 - Math.pow(-2 * percent + 2, 3) / 2;

                    setFloatIndex(startValue + distance * ease);

                    if (percent < 1) {
                        animFrameRef.current = requestAnimationFrame(step);
                    } else {
                        animFrameRef.current = null;
                    }
                };

                animFrameRef.current = requestAnimationFrame(step);
            };

            const handleDragStart = () => {
                if (animFrameRef.current) {
                    cancelAnimationFrame(animFrameRef.current);
                    animFrameRef.current = null;
                }
            };

            const handleFidget = () => {
                if (paradoxLevel > 0) {
                    setParadoxLevel(prev => Math.max(0, prev - 20));
                    if (paradoxLevel <= 20) setStatus("PARADOX AVERTED. REALITY STABILIZED.");
                }
            };

            const toggleCausality = () => {
                setCausality(true); setStatus("ERR: CAUSALITY OVERRIDE DENIED");
                setTimeout(() => setCausality(false), 500);
            };

            const triggerEmergency = () => {
                setEmergency(true); setStatus("TIMELINE SEVERED.");
                setTimeout(() => setEmergency(false), 4000);
            };

            // Hold-to-Jump Logic
            const scanTimer = useRef(null);
            const jumpStateRef = useRef(jumpState);
            useEffect(() => { jumpStateRef.current = jumpState; }, [jumpState]);

            const startScan = (e) => {
                e.preventDefault();
                if (jumpStateRef.current !== "locked") return;
                
                setJumpState("scanning"); 
                setStatus("CALIBRATING OPERATOR DNA...");
                
                if (scanTimer.current) clearTimeout(scanTimer.current);
                
                scanTimer.current = setTimeout(() => {
                    setJumpState("ready"); 
                    setStatus("DNA VERIFIED. JUMP AUTHORIZED.");
                }, 1500);
            };
            
            const cancelScan = (e) => {
                if (e) e.preventDefault();
                if (scanTimer.current) clearTimeout(scanTimer.current);
                
                if (jumpStateRef.current === "scanning") {
                    setJumpState("locked"); 
                    setStatus("SCAN ABORTED. HOLD STEADY.");
                }
            };

            const handleSwipeChange = (e) => setSwipeValue(e.target.value);
            const handleSwipeEnd = () => {
                if (swipeValue > 90) {
                    setSwipeValue(100);
                    setJumpState("jumping");
                    let step = 0;
                    const seq = ["SPOOLING QUANTUM DRIVE...", "WARNING: STRUCTURAL INTEGRITY AT 42%", "INITIATING TRANSLATION...", "DESTINATION REACHED."];
                    const int = setInterval(() => {
                        setStatus(seq[step]); step++;
                        if (step >= seq.length) {
                            clearInterval(int);
                            setTimeout(() => { setJumpState("locked"); setSwipeValue(0); setStatus("SYSTEM NOMINAL."); }, 1500);
                        }
                    }, 800);
                } else {
                    setSwipeValue(0);
                }
            };

            // --- Interpolation Math ---
            const clampedFloat = Math.max(0, Math.min(DESTINATIONS.length - 1, floatIndex));
            const lowerIndex = Math.floor(clampedFloat);
            const upperIndex = Math.ceil(clampedFloat);
            const fraction = clampedFloat - lowerIndex;
            
            const year1 = DESTINATIONS[lowerIndex].year;
            const year2 = DESTINATIONS[upperIndex].year;
            const interpolatedYear = Math.round(year1 + fraction * (year2 - year1));
            
            const nearestIntIndex = Math.round(clampedFloat);
            const isAnomaly = Math.abs(clampedFloat - nearestIntIndex) > 0.05; 
            
            const displayDest = isAnomaly ? {
                year: interpolatedYear,
                name: generateJumble(interpolatedYear, 12),
                location: generateJumble(interpolatedYear + 3, 14),
                news: [generateJumble(interpolatedYear+1, 30), generateJumble(interpolatedYear+2, 35)],
                isAnomaly: true
            } : DESTINATIONS[nearestIntIndex];

            const doubleNews = (displayDest.news.join(" ✦ ") + " ✦ ").repeat(2);

            return (
                <div className="h-full flex flex-col gap-2 relative">
                    {jumpState === "jumping" && <div className="absolute inset-0 glitch-bg z-50"></div>}
                    {emergency && <div className="absolute inset-0 bg-red-600/30 animate-pulse z-50 mix-blend-color-burn flex items-center justify-center"><h1 className="text-4xl text-red-500 font-black crt-flicker border-y-4 border-red-500 bg-black/80 w-full text-center py-4">TIMELINE SEVERED</h1></div>}

                    <div className="absolute right-0 top-0 bottom-0 w-1 bg-neutral-900 rounded-full opacity-50 z-0">
                        <div className={`w-full absolute bottom-0 transition-all duration-300 ${paradoxLevel > 50 ? 'bg-red-500 animate-pulse' : 'bg-cyan-600'}`} style={{height: `${paradoxLevel}%`}}></div>
                    </div>

                    {/* 1. HEADER (Signal Monitor added) */}
                    <div className="border border-cyan-900 bg-cyan-950/30 p-2 rounded flex justify-between items-center shrink-0">
                        <div className="font-bold tracking-widest flex items-center gap-2 cursor-pointer" onContextMenu={(e) => e.preventDefault()} onPointerDown={(e) => { e.preventDefault(); setParadoxLevel(100); setStatus("CRITICAL: PARADOX DETECTED!"); }}>
                            <div className="w-2 h-2 bg-cyan-400 rounded-full animate-ping"></div>
                            CHRONOS_OS <span className="text-[10px] text-cyan-700">v9.4</span>
                        </div>
                        {/* 6-Bar Signal Monitor with fluctuate effects */}
                        <div className="flex items-end gap-1 h-5 px-1">
                            {[1, 2, 3, 4, 5, 6].map(barIndex => {
                                const isHighlighted = barIndex <= signalStrength;
                                return (
                                    <div 
                                        key={barIndex} 
                                        className="w-1 transition-all duration-300 rounded-t-sm" 
                                        style={{
                                            height: `${(barIndex / 6) * 100}%`,
                                            backgroundColor: isHighlighted ? '#22d3ee' : '#083344',
                                            boxShadow: isHighlighted ? '0 0 6px #06b6d4' : 'none'
                                        }}
                                    />
                                );
                            })}
                        </div>
                    </div>

                    {/* 2. PRESENT (Anchor set to 'The Interstice Resort') */}
                    <div className="border border-cyan-800 bg-neutral-900/80 p-2 rounded shrink-0">
                        <div className="text-[9px] text-cyan-600 mb-0.5">LOCAL SIDEREAL TIME</div>
                        <div className="flex items-end justify-between">
                            <div className="text-2xl font-black">{timeStr}<span className="text-xs text-cyan-600">.{msStr}</span></div>
                            <div className="text-[10px] text-right text-cyan-500 max-w-[170px] leading-tight truncate">ANCHOR: The Interstice Resort</div>
                        </div>
                    </div>

                    {/* 3. DESTINATION */}
                    <div className={`border rounded flex flex-col shrink-0 transition-colors ${displayDest.isAnomaly ? 'border-red-900/60 bg-red-950/20' : 'border-fuchsia-900/60 bg-neutral-900/80'}`}>
                        <div className={`p-3 border-b flex items-center justify-between ${displayDest.isAnomaly ? 'border-red-900/40' : 'border-fuchsia-900/40'}`}>
                            
                            {/* Left Column (50% Width): Double-sized Knob */}
                            <CyberKnob 
                                floatIndex={floatIndex} 
                                maxIndex={DESTINATIONS.length - 1} 
                                onChange={setFloatIndex}
                                onDragStart={handleDragStart}
                                onSnap={animateToFloatIndex}
                            />
                            
                            {/* Right Column (50% Width): Stacked Information components */}
                            <div className={`w-1/2 flex flex-col justify-between border-l pl-4 min-h-[140px] ${displayDest.isAnomaly ? 'border-red-900/30' : 'border-fuchsia-900/30'}`}>
                                
                                {/* - "Temporal Target" label */}
                                <div className={`text-[10px] font-bold tracking-widest uppercase ${displayDest.isAnomaly ? 'text-red-500' : 'text-fuchsia-500'}`}>
                                    Temporal Target
                                </div>
                                
                                {/* - Preset destination drop-down menu/selector */}
                                <div className="relative my-1">
                                    <select 
                                        className={`appearance-none border text-[11px] px-2 py-1 w-full rounded outline-none cursor-pointer pr-6 ${displayDest.isAnomaly ? 'bg-red-950 border-red-700 text-red-300' : 'bg-fuchsia-950 border-fuchsia-700 text-fuchsia-300'}`}
                                        value={isAnomaly ? "" : nearestIntIndex} 
                                        onChange={(e) => animateToFloatIndex(parseInt(e.target.value))}
                                    >
                                        <option value="" disabled>{isAnomaly ? "[ LOST SIGNAL ]" : "HISTORY LOG"}</option>
                                        {DESTINATIONS.map((d, i) => <option key={i} value={i}>{d.year} - {d.location}</option>)}
                                    </select>
                                    <div className={`pointer-events-none absolute inset-y-0 right-1.5 flex items-center px-1 text-xs ${displayDest.isAnomaly ? 'text-red-500' : 'text-fuchsia-500'}`}>▼</div>
                                </div>
                                
                                {/* - Selected destination year */}
                                <div className={`text-4xl sm:text-5xl font-black ${displayDest.isAnomaly ? 'text-red-400 drop-shadow-[0_0_8px_rgba(248,113,113,0.5)]' : 'text-fuchsia-400 drop-shadow-[0_0_8px_rgba(217,70,239,0.5)]'}`}>
                                    {displayDest.year}
                                </div>
                                
                                {/* - Selected destination name & location label */}
                                <div className={`text-[11px] font-bold tracking-wider truncate flex flex-col ${displayDest.isAnomaly ? 'text-red-300' : 'text-fuchsia-300'}`}>
                                    <span className="truncate">{displayDest.name}</span>
                                    <span className="text-[9px] opacity-80 truncate">✦ {displayDest.location}</span>
                                </div>
                            </div>
                        </div>
                        {/* News Ticker: Doubled font size and 50% faster scrolling */}
                        <div className={`text-base sm:text-lg font-bold p-2.5 overflow-hidden shrink-0 ${displayDest.isAnomaly ? 'bg-red-950/50 text-red-400' : 'bg-black text-amber-500'}`}>
                            <div className="marquee-content">{doubleNews}</div>
                        </div>
                    </div>

                    {/* 4. JUMP BUTTON (Cleaned and scaled to span full horizontal width with larger text) */}
                    <div className="border border-fuchsia-800 bg-black rounded p-2 relative overflow-hidden shrink-0 h-[70px] flex items-center justify-center">
                        {jumpState === "locked" && (
                            <div className="w-full h-full flex items-center justify-center text-fuchsia-500 hover:text-fuchsia-400 active:text-fuchsia-300 cursor-pointer text-center px-4" 
                                 onPointerDown={startScan} 
                                 onPointerUp={cancelScan} 
                                 onPointerLeave={cancelScan}
                                 onPointerCancel={cancelScan}>
                                <div className="text-sm sm:text-base tracking-[0.2em] font-black uppercase animate-pulse">
                                    HOLD TO INITIATE TEMPORAL JUMP
                                </div>
                            </div>
                        )}
                        {jumpState === "scanning" && (
                            <div className="w-full h-full flex items-center justify-center text-cyan-400 crt-flicker text-center px-4"
                                 onPointerUp={cancelScan} 
                                 onPointerLeave={cancelScan}
                                 onPointerCancel={cancelScan}>
                                <div className="text-sm sm:text-base tracking-[0.2em] font-black uppercase">
                                    SCANNING BIOMETRIC SIGNATURE...
                                </div>
                            </div>
                        )}
                        {jumpState === "ready" && (
                            <div className="w-full px-2">
                                <div className="text-[10px] text-fuchsia-500 mb-1 text-center font-bold tracking-widest">SWIPE TO CONFIRM</div>
                                <div className="relative bg-neutral-900 rounded-full h-8 border border-fuchsia-900 overflow-hidden shadow-[inset_0_0_10px_rgba(0,0,0,0.8)]">
                                    {/* Filled bar progress (Tracks exactly 1:1 using percentage) */}
                                    <div className="absolute left-0 top-0 bottom-0 bg-fuchsia-600/40 pointer-events-none" style={{width: `${swipeValue}%`, transition: swipeValue == 0 ? 'width 0.3s' : 'none'}}></div>
                                    <input type="range" min="0" max="100" value={swipeValue} onChange={handleSwipeChange} onTouchEnd={handleSwipeEnd} onMouseUp={handleSwipeEnd} className="absolute inset-0 w-full h-full opacity-0 z-20 cursor-ew-resize" />
                                    {/* Handle button element (Perfect relative mapping with clean borders to eliminate lagging and viewport discrepancies) */}
                                    <div className="absolute top-0.5 bottom-0.5 w-12 bg-fuchsia-500 rounded-full flex items-center justify-center shadow-[0_0_10px_#d946ef] pointer-events-none text-black font-black" 
                                         style={{
                                             left: `calc(4px + (${swipeValue} * (100% - 56px) / 100))`,
                                             transition: swipeValue == 0 ? 'left 0.3s' : 'none'
                                         }}>
                                         »
                                    </div>
                                </div>
                            </div>
                        )}
                        {jumpState === "jumping" && (
                            <div className="text-white font-black text-xl tracking-[0.3em] crt-flicker">TRANSLATING</div>
                        )}
                    </div>

                    {/* 5. FIDGET TABS */}
                    <div className="border border-neutral-800 bg-neutral-900/50 rounded flex flex-col flex-1 min-h-[140px]">
                        <div className="flex border-b border-neutral-800 text-[10px] shrink-0">
                            {['calibrate', 'shields', 'diag'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 p-2 uppercase tracking-wider font-bold ${activeTab === t ? 'bg-cyan-900/40 text-cyan-300 border-b-2 border-cyan-500' : 'text-neutral-600'}`}>
                                    {t}
                                </button>
                            ))}
                        </div>
                        <div className="p-3 flex-1 flex flex-col justify-center gap-4 overflow-y-auto">
                            {activeTab === 'calibrate' && (
                                <>
                                    <div>
                                        <div className="text-[10px] text-cyan-700 mb-2">TIME DILATION</div>
                                        <input type="range" min="1" max="100" defaultValue="50" onChange={handleFidget} className="w-full fidget-slider" />
                                    </div>
                                    <div>
                                        <div className="text-[10px] text-cyan-700 mb-2">FLUX INTERVAL</div>
                                        <input type="range" min="1" max="10" defaultValue="5" onChange={handleFidget} className="w-full fidget-slider accent-fuchsia-500" />
                                    </div>
                                </>
                            )}
                            {activeTab === 'shields' && (
                                <div className="flex flex-col gap-3">
                                    <button onClick={handleFidget} className="border border-cyan-800 p-3 rounded text-sm font-bold active:bg-cyan-900 transition-colors flex justify-between items-center shadow-[inset_0_0_10px_rgba(6,182,212,0.1)]">
                                        QUANTUM SLICE <span className="bg-cyan-950 px-2 py-0.5 rounded text-[10px]">TOGGLE</span>
                                    </button>
                                    <button onClick={toggleCausality} className={`border p-3 rounded text-sm font-bold transition-all flex justify-between items-center shadow-[inset_0_0_10px_rgba(0,0,0,0.5)] ${causality ? 'bg-red-900 border-red-500 text-red-100' : 'border-cyan-800 active:bg-cyan-900'}`}>
                                        CAUSALITY GUARD <span className="bg-black px-2 py-0.5 rounded text-[10px]">{causality ? 'ERR' : 'OFF'}</span>
                                    </button>
                                </div>
                            )}
                            {activeTab === 'diag' && (
                                <div className="flex justify-center items-center h-full pb-2">
                                    <button onClick={triggerEmergency} className="w-24 h-24 rounded-full border-4 border-red-900 bg-red-950/50 text-red-500 text-[12px] font-black flex flex-col items-center justify-center gap-1 active:bg-red-600 active:text-white shadow-[0_0_20px_rgba(220,38,38,0.3)]">
                                        <IconAlert /> RECALL
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* 6. STATUS BAR (Flashes active when status key/text updates) */}
                    <div 
                        key={status} 
                        className="bg-black border border-cyan-900 p-2 rounded flex items-center gap-2 shrink-0 h-10 shadow-[inset_0_0_10px_rgba(6,182,212,0.1)] animate-status-flash"
                    >
                        <div className="w-2 h-2 rounded-full bg-cyan-500 animate-pulse shrink-0"></div>
                        <div className={`text-[10px] font-mono truncate w-full ${status.includes("ERR") || status.includes("CRITICAL") ? 'text-red-500 crt-flicker font-bold' : 'text-cyan-600'}`}>
                            {status}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
